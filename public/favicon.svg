<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="3" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Cream background square with slight roughness -->
  <rect width="32" height="32" rx="4" fill="#FEF9EE" filter="url(#rough)"/>

  <!-- Bold brutalist "A" — thick strokes, slightly imperfect -->
  <!-- Left leg -->
  <polygon points="2,29 9,3 13,3 7,29" fill="#08060d" filter="url(#rough)"/>
  <!-- Right leg -->
  <polygon points="19,3 23,3 30,29 24,29" fill="#08060d" filter="url(#rough)"/>
  <!-- Crossbar -->
  <polygon points="8,19 24,19 23,23 9,23" fill="#08060d" filter="url(#rough)"/>
</svg>